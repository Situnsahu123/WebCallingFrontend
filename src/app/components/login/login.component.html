<div class="auth-page fade-in">

    <!-- Left Panel: Brand -->
    <div class="auth-left">
        <div class="brand-block">
            <div class="brand-icon">
                <i class="pi pi-video"></i>
            </div>
            <h1 class="brand-name">WebCalling</h1>
            <p class="brand-tagline">Connect with anyone, anywhere — instantly.</p>
            <ul class="feature-list">
                <li><i class="pi pi-check-circle"></i> HD Video &amp; Voice Calls</li>
                <li><i class="pi pi-check-circle"></i> Secure Real-Time Messaging</li>
                <li><i class="pi pi-check-circle"></i> Smart Call History</li>
            </ul>
        </div>
    </div>

    <!-- Right Panel: Login Form -->
    <div class="auth-right">
        <div class="auth-card fade-in">

            <div class="auth-header">
                <h2>Welcome back</h2>
                <p>Sign in to your account to continue</p>
            </div>

            <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <div class="input-wrap">
                        <i class="pi pi-envelope input-icon"></i>
                        <input id="email" type="email" [(ngModel)]="credentials.email"
                               name="email" required #email="ngModel"
                               placeholder="name@company.com" class="form-input" />
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <div class="label-row">
                        <label for="password">Password</label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    <div class="input-wrap">
                        <i class="pi pi-lock input-icon"></i>
                        <input id="password" [type]="showPassword ? 'text' : 'password'"
                               [(ngModel)]="credentials.password" name="password"
                               required #password="ngModel"
                               placeholder="••••••••" class="form-input with-eye" />
                        <button type="button" class="eye-btn" (click)="showPassword = !showPassword" tabindex="-1">
                            <i [class]="showPassword ? 'pi pi-eye-slash' : 'pi pi-eye'"></i>
                        </button>
                    </div>
                </div>

                <p-message *ngIf="error" severity="error" [text]="error" styleClass="w-full"></p-message>

                <button type="submit" class="auth-btn" [disabled]="!loginForm.form.valid || loading">
                    <span *ngIf="!loading">Sign In</span>
                    <i *ngIf="loading" class="pi pi-spin pi-spinner"></i>
                </button>

            </form>

            <div class="auth-footer">
                <span>Don't have an account?</span>
                <a routerLink="/signup">Create one now</a>
            </div>

        </div>
    </div>

</div>
